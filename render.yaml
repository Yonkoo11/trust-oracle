services:
  - type: web
    runtime: docker
    name: trust-oracle
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
      - key: PAY_TO
        sync: false
      - key: ADMIN_TOKEN
        sync: false
    disk:
      name: trust-oracle-data
      mountPath: /app/data
      sizeGB: 1
