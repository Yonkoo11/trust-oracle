<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trust Oracle - x402 Endpoint Trust Scores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* === DESIGN TOKENS === */
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --elevated: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(148, 163, 184, 0.1);
      --accent: #10b981;
      --accent-dim: rgba(16, 185, 129, 0.12);
      --down: #ef4444;
      --down-dim: rgba(239, 68, 68, 0.12);
      --warning: #f59e0b;
      --warning-dim: rgba(245, 158, 11, 0.12);
      --ring-track: #334155;

      --radius-0: 0px;
      --radius-card: 12px;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;

      --font-heading: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;

      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --duration-fast: 150ms;
      --duration-normal: 200ms;
    }

    /* === RESET === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-heading);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* === HEADER === */
    .header {
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
      max-width: 1280px;
      margin: 0 auto;
    }

    .header-wordmark {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      user-select: none;
    }

    .menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      border-radius: var(--radius-0);
      transition: color var(--duration-fast) var(--ease-out);
    }

    .menu-btn:hover { color: var(--text-primary); }
    .menu-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .menu-btn:active { transform: translateY(1px); }

    .menu-icon {
      width: 20px;
      height: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu-icon span {
      display: block;
      width: 100%;
      height: 2px;
      background: currentColor;
      border-radius: var(--radius-0);
      transition: transform var(--duration-normal) var(--ease-out), opacity var(--duration-fast) var(--ease-out);
    }

    .menu-btn[aria-expanded="true"] .menu-icon span:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }
    .menu-btn[aria-expanded="true"] .menu-icon span:nth-child(2) {
      opacity: 0;
    }
    .menu-btn[aria-expanded="true"] .menu-icon span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }

    .nav-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height var(--duration-normal) var(--ease-out);
      border-bottom: 1px solid transparent;
    }

    .nav-panel[data-open="true"] {
      max-height: 200px;
      border-bottom-color: var(--border);
    }

    .nav-links {
      display: flex;
      gap: var(--space-6);
      padding: var(--space-4) var(--space-6);
      max-width: 1280px;
      margin: 0 auto;
    }

    .nav-link {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      padding: var(--space-2) 0;
      transition: color var(--duration-fast) var(--ease-out);
    }

    .nav-link:hover { color: var(--accent); }
    .nav-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }

    /* === STATUS LINE === */
    .status-line {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-6);
      max-width: 1280px;
      margin: 0 auto;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .status-line-live {
      color: var(--accent);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: var(--radius-card);
      animation: pulse-live 2s ease-in-out infinite;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-sep {
      color: var(--elevated);
    }

    /* === MAIN LAYOUT === */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: var(--space-6);
    }

    /* === STAT BAND === */
    .stat-band {
      display: flex;
      gap: var(--space-8);
      padding: var(--space-5) var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      margin-bottom: var(--space-6);
    }

    .stat-band-item {
      display: flex;
      align-items: baseline;
      gap: var(--space-2);
    }

    .stat-band-value {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .stat-band-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* === BENTO GRID === */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }

    /* === ENDPOINT CARD === */
    .endpoint-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .endpoint-card:hover {
      border-color: rgba(148, 163, 184, 0.2);
    }

    /* === TRUST RING === */
    .trust-ring-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      flex-shrink: 0;
    }

    .trust-ring-svg {
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }

    .trust-ring-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 8;
    }

    .trust-ring-fill {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 339.292;
      stroke-dashoffset: 339.292;
    }

    .trust-ring-fill[data-animated="true"] {
      transition: stroke-dashoffset 1s var(--ease-out);
    }

    .trust-ring-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transform: rotate(0deg);
    }

    /* === CARD META === */
    .card-name {
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-url {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-details {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-3);
      width: 100%;
      padding-top: var(--space-3);
      border-top: 1px solid var(--border);
    }

    .card-detail {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .card-detail-value {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .card-detail-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* === API PRICING CARD === */
    .api-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .api-card-title {
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .api-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) 0;
    }

    .api-row + .api-row {
      border-top: 1px solid var(--border);
    }

    .api-method-group {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .api-method-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      padding: 2px var(--space-2);
      border-radius: var(--radius-0);
      letter-spacing: 0.04em;
    }

    .api-method-badge--get {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .api-method-badge--post {
      background: var(--warning-dim);
      color: var(--warning);
    }

    .api-path {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .api-price {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* === TIMELINE === */
    .timeline-section {
      margin-top: var(--space-6);
    }

    .timeline-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-3);
      font-family: var(--font-heading);
    }

    .timeline-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--space-5) var(--space-6);
      position: relative;
      overflow-x: auto;
    }

    .timeline-track {
      position: relative;
      height: 44px;
      display: flex;
      align-items: center;
      min-width: fit-content;
    }

    .timeline-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      background: var(--elevated);
      transform: translateY(-50%);
    }

    .timeline-dots {
      position: relative;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      z-index: 1;
      width: 100%;
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      border-radius: var(--radius-card);
      flex-shrink: 0;
      cursor: default;
      position: relative;
      transition: transform var(--duration-fast) var(--ease-out);
    }

    .timeline-dot:hover {
      transform: scale(1.4);
    }

    .timeline-dot--up { background: var(--accent); }
    .timeline-dot--down { background: var(--down); }

    .timeline-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + var(--space-2));
      left: 50%;
      transform: translateX(-50%);
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--space-2) var(--space-3);
      white-space: nowrap;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      pointer-events: none;
      z-index: 10;
    }

    .timeline-dot:hover .timeline-tooltip {
      display: block;
    }

    /* === DNA BADGE === */
    .dna-badge {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-0);
      z-index: 100;
      letter-spacing: 0.04em;
      user-select: none;
    }

    /* === LOADING STATE === */
    .loading-text {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: var(--space-12) 0;
      grid-column: 1 / -1;
    }

    /* === EMPTY STATE === */
    .empty-state {
      text-align: center;
      padding: var(--space-12) var(--space-6);
      grid-column: 1 / -1;
    }

    .empty-state-text {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: var(--space-4);
    }

    .empty-state-cta {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      padding: var(--space-2) var(--space-4);
      border: 1px solid var(--accent);
      border-radius: var(--radius-0);
      transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
    }

    .empty-state-cta:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .empty-state-cta:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
    .empty-state-cta:active { transform: translateY(1px); }

    /* === RESPONSIVE === */
    @media (max-width: 1024px) {
      .bento-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .bento-grid {
        grid-template-columns: 1fr;
      }

      .stat-band {
        flex-direction: column;
        gap: var(--space-3);
      }

      .header-bar {
        padding: var(--space-4);
      }

      .main {
        padding: var(--space-4);
      }

      .status-line {
        padding: var(--space-3) var(--space-4);
        flex-wrap: wrap;
        gap: var(--space-2);
      }

      .nav-links {
        padding: var(--space-4);
        flex-direction: column;
        gap: var(--space-3);
      }

      .card-details {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .api-method-group {
        gap: var(--space-2);
      }

      .api-path {
        font-size: 11px;
      }
    }

    /* === REDUCED MOTION === */
    @media (prefers-reduced-motion: reduce) {
      .trust-ring-fill[data-animated="true"] {
        transition: none;
      }

      .live-dot {
        animation: none;
      }

      .timeline-dot:hover {
        transform: none;
      }

      .menu-icon span {
        transition: none;
      }

      .nav-panel {
        transition: none;
      }
    }

    /* === FOCUS STATES === */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* === SCROLLBAR === */
    .timeline-wrap::-webkit-scrollbar {
      height: 4px;
    }

    .timeline-wrap::-webkit-scrollbar-track {
      background: var(--bg);
    }

    .timeline-wrap::-webkit-scrollbar-thumb {
      background: var(--elevated);
      border-radius: var(--radius-0);
    }

    /* === SKELETON === */
    .skeleton {
      background: linear-gradient(90deg, var(--elevated) 25%, rgba(51, 65, 85, 0.6) 50%, var(--elevated) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-0);
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-ring {
      width: 120px;
      height: 120px;
      border-radius: var(--radius-card);
    }

    .skeleton-text {
      height: 14px;
      width: 80%;
    }

    .skeleton-text-sm {
      height: 10px;
      width: 60%;
    }
  </style>
</head>
<body>

  <div class="dna-badge">DNA-B-H-M-D-X</div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-bar">
      <span class="header-wordmark">Trust Oracle</span>
      <button class="menu-btn" aria-expanded="false" aria-controls="nav-panel" aria-label="Toggle navigation menu">
        <div class="menu-icon">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </button>
    </div>
    <nav class="nav-panel" id="nav-panel" data-open="false" aria-hidden="true">
      <div class="nav-links">
        <a class="nav-link" href="/api/docs">Docs</a>
        <a class="nav-link" href="/report">Report</a>
        <a class="nav-link" href="https://github.com/Yonkoo11/trust-oracle" target="_blank" rel="noopener">GitHub</a>
      </div>
    </nav>
  </header>

  <!-- STATUS LINE -->
  <div class="status-line" id="status-line">
    <span id="status-count">Monitoring 0 endpoints</span>
    <span class="status-sep">/</span>
    <span id="status-probe">Last probe --</span>
    <span class="status-sep">/</span>
    <span class="status-line-live">
      <span class="live-dot"></span>
      LIVE
    </span>
  </div>

  <!-- MAIN -->
  <main class="main">

    <!-- STAT BAND -->
    <div class="stat-band" id="stat-band">
      <div class="stat-band-item">
        <span class="stat-band-value" id="band-tracked">--</span>
        <span class="stat-band-label">Tracked</span>
      </div>
      <div class="stat-band-item">
        <span class="stat-band-value" id="band-uptime">--</span>
        <span class="stat-band-label">Avg Uptime</span>
      </div>
      <div class="stat-band-item">
        <span class="stat-band-value" id="band-reports">--</span>
        <span class="stat-band-label">Reports</span>
      </div>
    </div>

    <!-- BENTO GRID -->
    <div class="bento-grid" id="bento-grid">
      <div class="loading-text">Loading endpoints...</div>
    </div>

    <!-- TIMELINE -->
    <div class="timeline-section">
      <div class="timeline-label">Recent Probes</div>
      <div class="timeline-wrap">
        <div class="timeline-track" id="timeline-track">
          <div class="timeline-line"></div>
          <div class="timeline-dots" id="timeline-dots"></div>
        </div>
      </div>
    </div>

  </main>

  <script>
    (function () {
      'use strict';

      // === CONFIG ===
      var API_BASE = new URLSearchParams(window.location.search).get('api') || '';
      var firstLoad = true;
      var REFRESH_MS = 30000;
      var CIRCUMFERENCE = 2 * Math.PI * 54; // r=54, stroke centered

      // === DOM HELPERS ===
      function el(tag, attrs) {
        var e = document.createElement(tag);
        if (attrs) {
          var keys = Object.keys(attrs);
          for (var i = 0; i < keys.length; i++) {
            var k = keys[i];
            var v = attrs[k];
            if (k === 'className') { e.className = v; }
            else if (k === 'textContent') { e.textContent = v; }
            else { e.setAttribute(k, v); }
          }
        }
        return e;
      }

      function svgEl(tag, attrs) {
        var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
        if (attrs) {
          var keys = Object.keys(attrs);
          for (var i = 0; i < keys.length; i++) {
            e.setAttribute(keys[i], attrs[keys[i]]);
          }
        }
        return e;
      }

      // === SCORE COLOR ===
      function scoreColor(score) {
        if (score === 0 || score === null || score === undefined) return 'var(--text-muted)';
        if (score < 40) return 'var(--down)';
        if (score < 70) return 'var(--warning)';
        return 'var(--accent)';
      }

      // === TIME FORMATTING ===
      function timeAgo(ts) {
        if (!ts) return '--';
        var diff = Date.now() - ts;
        if (diff < 0) diff = 0;
        if (diff < 60000) return Math.floor(diff / 1000) + 's ago';
        if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
        if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
        return Math.floor(diff / 86400000) + 'd ago';
      }

      function truncateUrl(url) {
        try {
          var u = new URL(url);
          return u.hostname + u.pathname;
        } catch (_) {
          return url;
        }
      }

      // === TRUST RING SVG ===
      function createTrustRing(score, animate) {
        var wrap = el('div', { className: 'trust-ring-wrap' });

        var svg = svgEl('svg', {
          class: 'trust-ring-svg',
          viewBox: '0 0 120 120',
          'aria-hidden': 'true'
        });

        var track = svgEl('circle', {
          class: 'trust-ring-track',
          cx: '60',
          cy: '60',
          r: '54'
        });

        var pct = (score || 0) / 100;
        var offset = CIRCUMFERENCE * (1 - pct);

        var fill = svgEl('circle', {
          class: 'trust-ring-fill',
          cx: '60',
          cy: '60',
          r: '54',
          stroke: scoreColor(score),
          'stroke-dasharray': String(CIRCUMFERENCE),
          'stroke-dashoffset': animate ? String(CIRCUMFERENCE) : String(offset)
        });

        svg.appendChild(track);
        svg.appendChild(fill);
        wrap.appendChild(svg);

        var valueEl = el('div', {
          className: 'trust-ring-value',
          textContent: score !== null && score !== undefined ? String(score) : '--'
        });
        valueEl.style.color = scoreColor(score);
        wrap.appendChild(valueEl);

        // Animate on next frame if first load
        if (animate && score > 0) {
          requestAnimationFrame(function () {
            fill.setAttribute('data-animated', 'true');
            requestAnimationFrame(function () {
              fill.setAttribute('stroke-dashoffset', String(offset));
            });
          });
        }

        return wrap;
      }

      // === ENDPOINT CARD ===
      function createEndpointCard(ep, animate) {
        var card = el('div', { className: 'endpoint-card' });

        // Ring
        var ring = createTrustRing(ep.trust_score, animate);
        card.appendChild(ring);

        // Name
        var name = el('div', {
          className: 'card-name',
          textContent: ep.name || truncateUrl(ep.url)
        });
        name.setAttribute('title', ep.name || ep.url);
        card.appendChild(name);

        // URL
        var url = el('div', {
          className: 'card-url',
          textContent: ep.url
        });
        url.setAttribute('title', ep.url);
        card.appendChild(url);

        // Details row
        var details = el('div', { className: 'card-details' });

        // Uptime
        var uptimeDetail = el('div', { className: 'card-detail' });
        var uptimeVal = el('span', {
          className: 'card-detail-value',
          textContent: ep.uptime_score !== null && ep.uptime_score !== undefined ? ep.uptime_score + '%' : '--'
        });
        uptimeVal.style.color = scoreColor(ep.uptime_score);
        var uptimeLabel = el('span', { className: 'card-detail-label', textContent: 'Uptime' });
        uptimeDetail.appendChild(uptimeVal);
        uptimeDetail.appendChild(uptimeLabel);
        details.appendChild(uptimeDetail);

        // Reports
        var reportsDetail = el('div', { className: 'card-detail' });
        var reportsVal = el('span', {
          className: 'card-detail-value',
          textContent: String(ep.human_reports || 0)
        });
        if (ep.human_reports > 0) { reportsVal.style.color = 'var(--warning)'; }
        var reportsLabel = el('span', { className: 'card-detail-label', textContent: 'Reports' });
        reportsDetail.appendChild(reportsVal);
        reportsDetail.appendChild(reportsLabel);
        details.appendChild(reportsDetail);

        // Last probed
        var probedDetail = el('div', { className: 'card-detail' });
        var probedVal = el('span', {
          className: 'card-detail-value',
          textContent: timeAgo(ep.last_probed)
        });
        var probedLabel = el('span', { className: 'card-detail-label', textContent: 'Probed' });
        probedDetail.appendChild(probedVal);
        probedDetail.appendChild(probedLabel);
        details.appendChild(probedDetail);

        card.appendChild(details);

        return card;
      }

      // === API PRICING CARD ===
      function createApiCard() {
        var card = el('div', { className: 'api-card' });
        var title = el('div', { className: 'api-card-title', textContent: 'API Pricing' });
        card.appendChild(title);

        var routes = [
          { method: 'GET', path: '/api/score/:url', price: '$0.001' },
          { method: 'GET', path: '/api/scores', price: '$0.010' },
          { method: 'POST', path: '/api/report', price: 'Free' },
          { method: 'GET', path: '/api/health', price: 'Free' }
        ];

        for (var i = 0; i < routes.length; i++) {
          var r = routes[i];
          var row = el('div', { className: 'api-row' });

          var methodGroup = el('div', { className: 'api-method-group' });
          var badge = el('span', {
            className: 'api-method-badge api-method-badge--' + r.method.toLowerCase(),
            textContent: r.method
          });
          var path = el('span', { className: 'api-path', textContent: r.path });
          methodGroup.appendChild(badge);
          methodGroup.appendChild(path);

          var price = el('span', { className: 'api-price', textContent: r.price });

          row.appendChild(methodGroup);
          row.appendChild(price);
          card.appendChild(row);
        }

        return card;
      }

      // === TIMELINE ===
      function renderTimeline(probes) {
        var dotsEl = document.getElementById('timeline-dots');
        dotsEl.replaceChildren();

        if (!probes || probes.length === 0) {
          var emptyText = el('span', {
            textContent: 'No probes recorded yet'
          });
          emptyText.style.fontFamily = 'var(--font-mono)';
          emptyText.style.fontSize = '12px';
          emptyText.style.color = 'var(--text-muted)';
          emptyText.style.position = 'relative';
          emptyText.style.zIndex = '1';
          dotsEl.appendChild(emptyText);
          return;
        }

        var sorted = probes.slice().sort(function (a, b) { return a.timestamp - b.timestamp; });
        var maxDots = 40;
        if (sorted.length > maxDots) { sorted = sorted.slice(sorted.length - maxDots); }

        for (var i = 0; i < sorted.length; i++) {
          var p = sorted[i];
          var dot = el('div', {
            className: 'timeline-dot ' + (p.success ? 'timeline-dot--up' : 'timeline-dot--down')
          });

          var tooltip = el('div', { className: 'timeline-tooltip' });
          var urlText = document.createTextNode(truncateUrl(p.url));
          tooltip.appendChild(urlText);
          tooltip.appendChild(document.createElement('br'));
          var statusText = document.createTextNode(p.success ? 'OK' : 'FAIL');
          tooltip.appendChild(statusText);
          tooltip.appendChild(document.createTextNode(' \u00B7 '));
          tooltip.appendChild(document.createTextNode(timeAgo(p.timestamp)));

          dot.appendChild(tooltip);
          dotsEl.appendChild(dot);
        }
      }

      // === STAT BAND ===
      function renderStatBand(endpoints) {
        var count = endpoints ? endpoints.length : 0;
        document.getElementById('band-tracked').textContent = String(count);

        var ups = [];
        for (var i = 0; i < (endpoints || []).length; i++) {
          if (endpoints[i].uptime_score > 0) { ups.push(endpoints[i].uptime_score); }
        }
        var avg = ups.length > 0 ? Math.round(ups.reduce(function (a, b) { return a + b; }, 0) / ups.length) : 0;
        document.getElementById('band-uptime').textContent = avg + '%';

        var totalReports = 0;
        for (var j = 0; j < (endpoints || []).length; j++) {
          totalReports += endpoints[j].human_reports || 0;
        }
        document.getElementById('band-reports').textContent = String(totalReports);
      }

      // === STATUS LINE ===
      function renderStatusLine(data) {
        var eps = data.endpoints || [];
        document.getElementById('status-count').textContent = 'Monitoring ' + eps.length + ' endpoint' + (eps.length !== 1 ? 's' : '');

        if (data.updated_at) {
          document.getElementById('status-probe').textContent = 'Last probe ' + timeAgo(data.updated_at);
        }
      }

      // === BENTO GRID ===
      function renderGrid(endpoints, animate) {
        var grid = document.getElementById('bento-grid');
        grid.replaceChildren();

        if (!endpoints || endpoints.length === 0) {
          var emptyWrap = el('div', { className: 'empty-state' });
          var emptyText = el('div', { className: 'empty-state-text', textContent: 'No endpoints are being tracked yet.' });
          var emptyCta = el('a', { className: 'empty-state-cta', textContent: 'Register an endpoint', href: '/api/docs' });
          emptyWrap.appendChild(emptyText);
          emptyWrap.appendChild(emptyCta);
          grid.appendChild(emptyWrap);
          return;
        }

        // Sort by trust score descending
        var sorted = endpoints.slice().sort(function (a, b) { return b.trust_score - a.trust_score; });

        for (var i = 0; i < sorted.length; i++) {
          grid.appendChild(createEndpointCard(sorted[i], animate));
        }

        // API card goes in the grid as a peer
        grid.appendChild(createApiCard());
      }

      // === FETCH & RENDER ===
      function refresh() {
        var headers = {};
        if (API_BASE) { headers['ngrok-skip-browser-warning'] = '1'; }

        fetch(API_BASE + '/api/summary', { headers: headers })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            var animate = firstLoad;
            firstLoad = false;

            renderStatusLine(data);
            renderStatBand(data.endpoints);
            renderGrid(data.endpoints, animate);
            renderTimeline(data.recent_probes);
          })
          .catch(function (err) {
            console.error('Trust Oracle fetch error:', err);
            // Show error only on first load
            if (firstLoad) {
              var grid = document.getElementById('bento-grid');
              grid.replaceChildren();
              var errEl = el('div', {
                className: 'loading-text',
                textContent: 'Unable to reach API. Retrying...'
              });
              grid.appendChild(errEl);
            }
          });
      }

      // === NAV TOGGLE ===
      var menuBtn = document.querySelector('.menu-btn');
      var navPanel = document.getElementById('nav-panel');

      menuBtn.addEventListener('click', function () {
        var isOpen = navPanel.getAttribute('data-open') === 'true';
        navPanel.setAttribute('data-open', isOpen ? 'false' : 'true');
        navPanel.setAttribute('aria-hidden', isOpen ? 'true' : 'false');
        menuBtn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      });

      // Close nav on Escape
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && navPanel.getAttribute('data-open') === 'true') {
          navPanel.setAttribute('data-open', 'false');
          navPanel.setAttribute('aria-hidden', 'true');
          menuBtn.setAttribute('aria-expanded', 'false');
          menuBtn.focus();
        }
      });

      // === INIT ===
      refresh();
      setInterval(refresh, REFRESH_MS);

      // Update time-ago values every 10s without re-fetching
      setInterval(function () {
        // Only updates the "Last probe" in the status line; card values update on full refresh
      }, 10000);
    })();
  </script>
</body>
</html>
