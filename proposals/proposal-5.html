<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trust Oracle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --text-muted: #555555;
      --border: rgba(255, 255, 255, 0.08);
      --up: #22c55e;
      --down: #ef4444;

      --font-body: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', 'Cascadia Code', monospace;

      --radius: 0px;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;
      --space-20: 80px;

      --duration-fast: 150ms;
      --duration-normal: 200ms;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== RESET ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'tnum' 1;
      font-variant-numeric: tabular-nums;
    }

    /* ===== DNA BADGE ===== */
    .dna-badge {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      z-index: 100;
      pointer-events: none;
      user-select: none;
    }

    /* ===== PAGE ===== */
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* ===== NAV ===== */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-5) 0;
      border-bottom: 1px solid var(--border);
    }

    .nav-left {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .nav-dot--live { background: var(--up); }
    .nav-dot--offline { background: var(--down); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: var(--space-6);
    }

    .nav-link {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--duration-fast) var(--ease-out);
      display: inline-flex;
      align-items: center;
      min-height: 44px;
    }

    .nav-link:hover { color: var(--text-primary); }
    .nav-link:focus-visible {
      outline: 1px solid var(--text-secondary);
      outline-offset: 4px;
    }

    /* ===== STATS ROW ===== */
    .stats {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: var(--space-16);
      padding: var(--space-16) 0;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: var(--space-2);
      letter-spacing: 0.01em;
    }

    /* ===== SECTION ===== */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: var(--space-6) 0 var(--space-4);
    }

    /* ===== ENDPOINT BANDS ===== */
    .ep-band {
      display: grid;
      grid-template-columns: var(--space-8) 72px 1fr auto;
      align-items: center;
      gap: var(--space-6);
      padding: var(--space-5) 0;
      border-bottom: 1px solid var(--border);
      min-height: 56px;
    }

    .ep-dot-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ep-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ep-dot--up { background: var(--up); }
    .ep-dot--down { background: var(--down); }
    .ep-dot--unknown { background: var(--text-muted); }

    .ep-score {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      text-align: right;
    }

    .ep-info {
      min-width: 0;
    }

    .ep-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ep-url {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .ep-meta {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ep-meta-item {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .ep-meta-label {
      color: var(--text-muted);
      font-size: 11px;
      display: block;
      margin-bottom: 1px;
    }

    /* ===== PROBES DISCLOSURE ===== */
    .probes-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-5) 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      color: var(--text-secondary);
      font-size: 13px;
      min-height: 44px;
    }

    .probes-toggle:hover {
      color: var(--text-primary);
    }

    .probes-toggle:focus-visible {
      outline: 1px solid var(--text-secondary);
      outline-offset: -1px;
    }

    .probes-toggle:active {
      opacity: 0.8;
    }

    .probes-chevron {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      transition: transform var(--duration-fast) var(--ease-out);
    }

    .probes-toggle[aria-expanded="true"] .probes-chevron {
      transform: rotate(90deg);
    }

    .probes-list {
      display: none;
    }

    .probes-list--open {
      display: block;
    }

    .probe-row {
      display: grid;
      grid-template-columns: var(--space-8) 1fr auto;
      align-items: center;
      gap: var(--space-6);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .probe-url {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .probe-time {
      color: var(--text-muted);
      font-size: 12px;
      white-space: nowrap;
    }

    /* ===== API SECTION ===== */
    .api-band {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--space-6);
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--border);
    }

    .api-path {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
    }

    .api-method {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .api-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== FOOTER ===== */
    .footer {
      padding: var(--space-16) 0 var(--space-8);
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--duration-fast) var(--ease-out);
      display: inline-flex;
      align-items: center;
      min-height: 44px;
    }

    .footer a:hover { color: var(--text-primary); }
    .footer a:focus-visible {
      outline: 1px solid var(--text-secondary);
      outline-offset: 4px;
    }

    /* ===== LOADING ===== */
    .loading-band {
      padding: var(--space-5) 0;
      border-bottom: 1px solid var(--border);
    }

    .skeleton {
      background: var(--border);
      height: 16px;
      width: 200px;
      border-radius: var(--radius);
    }

    .skeleton--wide { width: 60%; }
    .skeleton--narrow { width: 80px; }
    .skeleton--score {
      width: 48px;
      height: 36px;
    }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .skeleton {
      animation: skeleton-pulse 1.5s ease-out infinite;
    }

    /* ===== ERROR STATE ===== */
    .error-state {
      padding: var(--space-16) 0;
      text-align: center;
    }

    .error-state p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: var(--space-4);
    }

    .error-retry {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--border);
      padding: var(--space-2) var(--space-4);
      cursor: pointer;
      border-radius: var(--radius);
      transition: color var(--duration-fast) var(--ease-out),
                  border-color var(--duration-fast) var(--ease-out);
      min-height: 44px;
      min-width: 44px;
    }

    .error-retry:hover {
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .error-retry:active {
      opacity: 0.8;
    }

    .error-retry:focus-visible {
      outline: 1px solid var(--text-secondary);
      outline-offset: 4px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      padding: var(--space-16) 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .stats { gap: var(--space-10); padding: var(--space-12) 0; }
      .stat-value { font-size: 32px; }

      .ep-band {
        grid-template-columns: var(--space-6) 56px 1fr;
        grid-template-rows: auto auto;
        gap: var(--space-3) var(--space-4);
      }

      .ep-meta {
        grid-column: 3 / -1;
        grid-row: 2;
        gap: var(--space-6);
        font-size: 12px;
      }

      .ep-score { font-size: 28px; }

      .nav-right { gap: var(--space-4); }
      .dna-badge { display: none; }
    }

    @media (max-width: 480px) {
      .stats { flex-direction: column; gap: var(--space-8); }
      .nav-right .nav-link:not(:last-child) { display: none; }
      .ep-meta { gap: var(--space-4); }
    }
  </style>
</head>
<body>

  <div class="dna-badge">DNA-S-T-C-M-S</div>

  <div class="page">

    <!-- NAV -->
    <nav class="nav" role="navigation" aria-label="Primary">
      <div class="nav-left">Trust Oracle</div>
      <div class="nav-center" id="conn-status">
        <div class="nav-dot" id="conn-dot"></div>
        <span id="conn-text">Connecting</span>
      </div>
      <div class="nav-right">
        <a href="/api/docs" class="nav-link">Docs</a>
        <a href="/report" class="nav-link">Report</a>
        <a href="https://github.com/yonkoo11/trust-oracle" class="nav-link" target="_blank" rel="noopener">GitHub</a>
      </div>
    </nav>

    <!-- STATS -->
    <div class="stats" id="stats-row" aria-label="Overview statistics">
      <div class="stat">
        <div class="stat-value" id="stat-endpoints">--</div>
        <div class="stat-label">Endpoints</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-uptime">--</div>
        <div class="stat-label">Uptime</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-reports">--</div>
        <div class="stat-label">Reports</div>
      </div>
    </div>

    <!-- ENDPOINTS -->
    <div class="section-label" id="endpoints-label">Endpoints</div>
    <div id="endpoints-list" role="list" aria-labelledby="endpoints-label"></div>

    <!-- RECENT PROBES -->
    <div id="probes-section"></div>

    <!-- API ROUTES -->
    <div class="section-label">API</div>
    <div id="api-list">
      <div class="api-band">
        <div>
          <div class="api-path">/api/summary</div>
          <div class="api-desc">Full dashboard payload</div>
        </div>
        <div class="api-method">GET</div>
      </div>
      <div class="api-band">
        <div>
          <div class="api-path">/api/trust/:url</div>
          <div class="api-desc">Trust score for a single endpoint</div>
        </div>
        <div class="api-method">GET</div>
      </div>
      <div class="api-band">
        <div>
          <div class="api-path">/api/report</div>
          <div class="api-desc">Submit a human quality report</div>
        </div>
        <div class="api-method">POST</div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <a href="https://www.x402.org" target="_blank" rel="noopener">x402</a>
      &nbsp;&nbsp;+&nbsp;&nbsp;
      <a href="https://worldcoin.org/world-id" target="_blank" rel="noopener">World ID</a>
      &nbsp;&nbsp;+&nbsp;&nbsp;
      <a href="https://xmtp.org" target="_blank" rel="noopener">XMTP</a>
    </footer>

  </div>

  <script>
    (function () {
      'use strict';

      /* ===== CONFIG ===== */
      var API_BASE = new URLSearchParams(window.location.search).get('api') || '';
      var REFRESH_MS = 30000;

      /* ===== CONNECTION STATE ===== */
      var ConnState = { LIVE: 'live', OFFLINE: 'offline', CONNECTING: 'connecting' };
      var connState = ConnState.CONNECTING;

      function setConn(state) {
        connState = state;
        var dot = document.getElementById('conn-dot');
        var text = document.getElementById('conn-text');
        dot.className = 'nav-dot';
        if (state === ConnState.LIVE) {
          dot.classList.add('nav-dot--live');
          text.textContent = 'Live';
        } else if (state === ConnState.OFFLINE) {
          dot.classList.add('nav-dot--offline');
          text.textContent = 'Offline';
        } else {
          text.textContent = 'Connecting';
        }
      }

      /* ===== HELPERS ===== */
      function el(tag, attrs, children) {
        var node = document.createElement(tag);
        if (attrs) {
          Object.keys(attrs).forEach(function (k) {
            if (k === 'className') { node.className = attrs[k]; }
            else if (k === 'textContent') { node.textContent = attrs[k]; }
            else { node.setAttribute(k, attrs[k]); }
          });
        }
        if (children) {
          children.forEach(function (c) { if (c) node.appendChild(c); });
        }
        return node;
      }

      function timeAgo(ts) {
        var diff = Date.now() - ts;
        if (diff < 60000) return Math.max(0, Math.floor(diff / 1000)) + 's ago';
        if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
        if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
        return Math.floor(diff / 86400000) + 'd ago';
      }

      function clear(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      /* ===== LOADING STATE ===== */
      function renderLoading() {
        var list = document.getElementById('endpoints-list');
        clear(list);
        for (var i = 0; i < 4; i++) {
          var band = el('div', { className: 'loading-band' });
          var sk = el('div', { className: 'skeleton skeleton--wide' });
          band.appendChild(sk);
          list.appendChild(band);
        }
      }

      /* ===== ERROR STATE ===== */
      function renderError(msg) {
        var list = document.getElementById('endpoints-list');
        clear(list);
        var container = el('div', { className: 'error-state' });
        container.appendChild(el('p', { textContent: msg || 'Failed to load data' }));
        var btn = el('button', { className: 'error-retry', textContent: 'Retry', type: 'button' });
        btn.addEventListener('click', function () {
          renderLoading();
          refresh();
        });
        container.appendChild(btn);
        list.appendChild(container);
      }

      /* ===== RENDER ENDPOINTS ===== */
      function renderEndpoints(endpoints) {
        var list = document.getElementById('endpoints-list');
        clear(list);

        if (!endpoints || endpoints.length === 0) {
          list.appendChild(el('div', { className: 'empty-state', textContent: 'No endpoints registered' }));
          return;
        }

        // Stats
        document.getElementById('stat-endpoints').textContent = endpoints.length;

        var totalUptime = 0;
        var totalReports = 0;
        endpoints.forEach(function (ep) {
          totalUptime += (ep.uptime_score || 0);
          totalReports += (ep.human_reports || 0);
        });

        var avgUptime = Math.round(totalUptime / endpoints.length);
        document.getElementById('stat-uptime').textContent = avgUptime + '%';
        document.getElementById('stat-reports').textContent = totalReports;

        // Endpoint bands
        endpoints.forEach(function (ep) {
          var band = el('div', { className: 'ep-band', role: 'listitem' });

          // Status dot
          var isUp = ep.uptime_score > 50;
          var isUnknown = ep.uptime_score === undefined || ep.uptime_score === null;
          var dotClass = isUnknown ? 'ep-dot ep-dot--unknown' :
            isUp ? 'ep-dot ep-dot--up' : 'ep-dot ep-dot--down';
          var dotCell = el('div', { className: 'ep-dot-cell' });
          dotCell.appendChild(el('div', { className: dotClass }));
          band.appendChild(dotCell);

          // Trust score
          var score = ep.trust_score !== undefined && ep.trust_score !== null
            ? Math.round(ep.trust_score)
            : '--';
          band.appendChild(el('div', { className: 'ep-score', textContent: String(score) }));

          // Name + URL
          var info = el('div', { className: 'ep-info' });
          info.appendChild(el('div', { className: 'ep-name', textContent: ep.name || shortenUrl(ep.url) }));
          info.appendChild(el('div', { className: 'ep-url', textContent: ep.url }));
          band.appendChild(info);

          // Meta
          var meta = el('div', { className: 'ep-meta' });

          var uptimeItem = el('div', { className: 'ep-meta-item' });
          uptimeItem.appendChild(el('span', { className: 'ep-meta-label', textContent: 'Uptime' }));
          uptimeItem.appendChild(document.createTextNode((ep.uptime_score !== undefined ? ep.uptime_score + '%' : '--')));
          meta.appendChild(uptimeItem);

          var reportsItem = el('div', { className: 'ep-meta-item' });
          reportsItem.appendChild(el('span', { className: 'ep-meta-label', textContent: 'Reports' }));
          reportsItem.appendChild(document.createTextNode(ep.human_reports !== undefined ? String(ep.human_reports) : '0'));
          meta.appendChild(reportsItem);

          var lastItem = el('div', { className: 'ep-meta-item' });
          lastItem.appendChild(el('span', { className: 'ep-meta-label', textContent: 'Last probed' }));
          lastItem.appendChild(document.createTextNode(ep.last_probed ? timeAgo(ep.last_probed) : 'never'));
          meta.appendChild(lastItem);

          band.appendChild(meta);
          list.appendChild(band);
        });
      }

      function shortenUrl(url) {
        if (!url) return 'Unknown';
        try {
          var u = new URL(url);
          return u.hostname + u.pathname;
        } catch (e) {
          return url;
        }
      }

      /* ===== RENDER PROBES ===== */
      var probesOpen = false;

      function renderProbes(probes) {
        var section = document.getElementById('probes-section');
        clear(section);

        if (!probes || probes.length === 0) return;

        var passing = probes.filter(function (p) { return p.success; }).length;
        var total = probes.length;
        var allPassing = passing === total;
        var summaryText = total + ' probes in last 5 min';
        if (allPassing) {
          summaryText += ' \u2014 all passing';
        } else {
          summaryText += ' \u2014 ' + (total - passing) + ' failing';
        }

        // Label
        section.appendChild(el('div', { className: 'section-label', textContent: 'Recent Probes' }));

        // Toggle button
        var toggle = el('button', {
          className: 'probes-toggle',
          'aria-expanded': probesOpen ? 'true' : 'false',
          'aria-controls': 'probes-detail',
          type: 'button'
        });
        toggle.appendChild(el('span', { textContent: summaryText }));

        // Chevron SVG
        var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 16 16');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
        svg.setAttribute('stroke-width', '1.5');
        svg.setAttribute('class', 'probes-chevron');
        svg.setAttribute('aria-hidden', 'true');
        var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M6 4l4 4-4 4');
        svg.appendChild(path);
        toggle.appendChild(svg);

        section.appendChild(toggle);

        // Probe list
        var listContainer = el('div', {
          className: probesOpen ? 'probes-list probes-list--open' : 'probes-list',
          id: 'probes-detail'
        });

        probes.forEach(function (probe) {
          var row = el('div', { className: 'probe-row' });

          var dotCell = el('div', { className: 'ep-dot-cell' });
          var dotClass = probe.success ? 'ep-dot ep-dot--up' : 'ep-dot ep-dot--down';
          dotCell.appendChild(el('div', { className: dotClass }));
          row.appendChild(dotCell);

          row.appendChild(el('div', { className: 'probe-url', textContent: probe.url }));
          row.appendChild(el('div', { className: 'probe-time', textContent: probe.timestamp ? timeAgo(probe.timestamp) : '' }));

          listContainer.appendChild(row);
        });

        section.appendChild(listContainer);

        // Toggle behavior
        toggle.addEventListener('click', function () {
          probesOpen = !probesOpen;
          toggle.setAttribute('aria-expanded', probesOpen ? 'true' : 'false');
          if (probesOpen) {
            listContainer.classList.add('probes-list--open');
          } else {
            listContainer.classList.remove('probes-list--open');
          }
        });
      }

      /* ===== FETCH ===== */
      function refresh() {
        var headers = {};
        if (API_BASE) { headers['ngrok-skip-browser-warning'] = '1'; }

        fetch(API_BASE + '/api/summary', { headers: headers })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            setConn(ConnState.LIVE);
            renderEndpoints(data.endpoints || []);
            renderProbes(data.recent_probes || []);
          })
          .catch(function (err) {
            setConn(ConnState.OFFLINE);
            renderError('Could not reach server: ' + err.message);
          });
      }

      /* ===== INIT ===== */
      renderLoading();
      refresh();
      setInterval(refresh, REFRESH_MS);
    })();
  </script>
</body>
</html>
